<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INVOORENT - Hors ligne</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #0f1923;
      color: #e5e7eb;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      width: min(520px, 100%);
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
    }
    h1 { margin: 0 0 10px; font-size: 1.25rem; }
    p { margin: 0 0 8px; line-height: 1.45; color: #cbd5e1; }
    .hint { color: #94a3b8; font-size: 0.92rem; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Mode hors ligne</h1>
    <p>La connexion réseau est indisponible pour le moment.</p>
    <p class="hint">Les ressources déjà mises en cache restent utilisables. Reconnectez-vous puis rechargez la page.</p>
  </main>
</body>
</html>
