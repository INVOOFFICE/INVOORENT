<!-- page-vehicules -->
<div class="page" id="page-vehicules">
<div class="page-section-header">
<div>
<h2>Parc automobile</h2>
<p>Gérez votre flotte de véhicules</p>
</div>
<div class="page-section-header-right">
<div class="filters" id="veh-filters">
<button class="filter-btn active" onclick="filterVeh(this,'all')">Tous</button>
<button class="filter-btn" onclick="filterVeh(this,'disponible')">Disponibles</button>
<button class="filter-btn" onclick="filterVeh(this,'loué')">Loués</button>
<button class="filter-btn" onclick="filterVeh(this,'maintenance')">Maintenance</button>
</div>
<button class="btn btn-outline btn-sm" onclick="exportCSV('veh')">
<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
<path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
<polyline points="7 10 12 15 17 10"/>
<line x1="12" y1="15" x2="12" y2="3"/>
</svg>
 Export
 </button>
<button class="btn btn-outline btn-sm" onclick="openImportModal('veh')" style="border-color:var(--accent2);color:var(--accent2);">
<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
<path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
<polyline points="17 8 12 3 7 8"/>
<line x1="12" y1="3" x2="12" y2="15"/>
</svg>
 Import
 </button>
<button class="btn btn-primary btn-sm" onclick="openNewVehModal()">
<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
<path d="M12 5v14M5 12h14"/>
</svg>
 Ajouter
 </button>
</div>
</div>
<div class="table-wrap">
<table>
<thead>
<tr>
<th>Immatriculation</th>
<th>Marque / Modèle</th>
<th>Catégorie</th>
<th>Année</th>
<th>Tarif / jour (MAD)</th>
<th>Statut</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="veh-tbody">
</tbody>
</table>
</div>
</div>
