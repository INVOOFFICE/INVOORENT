<!-- page-maintenance -->
<div class="page" id="page-maintenance">
<div class="page-section-header">
<div>
<h2>Maintenance</h2>
<p>Suivi des entretiens et alertes</p>
</div>
<div class="page-section-header-right">
<div class="filters" id="maint-filters">
<button class="filter-btn active" onclick="filterMaint(this,'all')">Toutes</button>
<button class="filter-btn" onclick="filterMaint(this,'planifiée')">Planifiées</button>
<button class="filter-btn" onclick="filterMaint(this,'effectuée')">Effectuées</button>
</div>
<button class="btn btn-outline btn-sm" onclick="exportCSV('maint')">Export</button>
<button class="btn btn-primary btn-sm" onclick="openMaintModal()">
<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
<path d="M12 5v14M5 12h14"/>
</svg>
 Planifier
 </button>
</div>
</div>
<div id="maint-alerts-wrap">
</div>
<div class="table-wrap" style="margin-top:16px">
<table class="data-table">
<thead>
<tr>
<th>Véhicule</th>
<th>Type</th>
<th>Date prévue</th>
<th>Km au compteur</th>
<th>Km seuil alerte</th>
<th>Statut</th>
<th>Notes</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="maint-tbody">
</tbody>
</table>
</div>
</div>
<div class="modal-overlay" id="maint-modal" role="dialog" aria-modal="true" aria-labelledby="maint-modal-title" aria-hidden="true">
<div class="modal" style="max-width:500px">
<div class="modal-header">
<h3 id="maint-modal-title">Planifier une maintenance</h3>
<button class="close-btn" onclick="closeModal('maint-modal')">
<svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
<path d="M18 6L6 18M6 6l12 12"/>
</svg>
</button>
</div>
<div class="modal-body">
<div class="form-grid">
<div class="form-group form-full">
<label>Véhicule *</label>
<select id="maint-veh">
<option value="">-- Sélectionner --</option>
</select>
</div>
<div class="form-group">
<label>Type d'intervention *</label>
<select id="maint-type">
<option>Vidange</option>
<option>Révision générale</option>
<option>Contrôle technique</option>
<option>Freins</option>
<option>Pneus</option>
<option>Climatisation</option>
<option>Courroie distribution</option>
<option>Autre</option>
</select>
</div>
<div class="form-group">
<label>Statut</label>
<select id="maint-statut">
<option value="planifiée">Planifiée</option>
<option value="effectuée">Effectuée</option>
</select>
</div>
<div class="form-group">
<label>Date prévue *</label>
<input type="date" id="maint-date">
</div>
<div class="form-group">
<label>Coût (MAD)</label>
<input type="number" id="maint-cout" placeholder="0">
</div>
<div class="form-group">
<label>Km actuel du véhicule</label>
<input type="number" id="maint-km" placeholder="ex: 45000">
</div>
<div class="form-group">
<label>Km seuil prochaine alerte</label>
<input type="number" id="maint-km-seuil" placeholder="ex: 50000">
</div>
<div class="form-group form-full">
<label>Notes</label>
<textarea id="maint-notes" placeholder="Observations, pièces remplacées">
</textarea>
</div>
</div>
</div>
<div class="modal-footer">
<button class="btn btn-outline" onclick="closeModal('maint-modal')">Annuler</button>
<button class="btn btn-primary" onclick="saveMaintenance()">Enregistrer</button>
</div>
</div>
</div>
